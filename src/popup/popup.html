<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arlo</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- 1. Navbar -->
  <header class="navbar">
    <div class="logo-wrap">
      <div class="logo-icon">S</div>
      <div class="logo-text">Arlo</div>
    </div>
    <div class="plan-badge" id="planBadge">Free</div>
    <button class="btn-settings" id="btnSettings" title="Dashboard">⚙</button>
  </header>

  <!-- 2. Detection Banner -->
  <div class="detection-banner glass-card" id="detectionBanner">
    <div class="dot inactive" id="detectionDot"></div>
    <div class="detection-text" id="detectionText">Detecting job portal...</div>
  </div>

  <!-- 3. Match Score Row -->
  <div class="score-row glass-card" id="scoreRow" style="display:none;">
    <div class="score-info">
      <div class="score-title">Match Score</div>
      <div class="score-value" id="scoreValue">—</div>
    </div>
    <div class="score-icon">📈</div>
  </div>

  <!-- 4. Skill Tags -->
  <div class="skill-tags glass-card" id="skillTagsCard" style="display:none;">
    <div class="skill-label">Required Skills</div>
    <div class="skill-list" id="skillChips">
      <!-- Injected by JS -->
    </div>
  </div>

  <!-- 5. Big Blue Auto-fill Button -->
  <button class="btn-autofill" id="btnAutoFill" disabled>
    <span id="btnAutoFillText">Auto-fill Application</span>
  </button>

  <!-- 6. Mini Buttons -->
  <div class="action-grid">
    <button class="btn-mini" id="btnCoverLetter">
      <span>✍️</span> Cover Letter
    </button>
    <button class="btn-mini" id="btnTracker">
      <span>📊</span> View Tracker
    </button>
  </div>

  <!-- 7. Footer Stats -->
  <div class="footer-stats">
    <div class="stat-item">
      <div class="stat-val" id="statApplied">0</div>
      <div class="stat-lbl">Applied</div>
    </div>
    <div class="stat-item">
      <div class="stat-val" id="statResponses">0</div>
      <div class="stat-lbl">Responses</div>
    </div>
    <div class="stat-item">
      <div class="stat-val" id="statCredits">10</div>
      <div class="stat-lbl">Credits Left</div>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
